<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070D1A" />

    <!-- Primary SEO -->
    <title>Free AI Financial Modeling Software | Koala Statements</title>
    <meta name="description" content="Build an investor-ready 3-statement financial model from a single sentence. AI-driven assumptions, multi-scenario forecasts, industry benchmarks, and live reports — free for everyone." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Koala Statements" />
    <link rel="canonical" href="https://financial-statements-one.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Koala Statements" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://financial-statements-one.vercel.app/" />
    <meta property="og:title" content="Koala Statements — Financial models that build themselves" />
    <meta property="og:description" content="From one sentence to an investor-ready 3-statement model — with AI assumptions, multi-scenario forecasts, and industry benchmarks. Free for everyone." />
    <meta property="og:image" content="https://financial-statements-one.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Koala Statements — AI-native financial modeling" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Koala Statements — Financial models that build themselves" />
    <meta name="twitter:description" content="From one sentence to an investor-ready 3-statement model — with AI assumptions, scenarios, and benchmarks. Free." />
    <meta name="twitter:image" content="https://financial-statements-one.vercel.app/og-image.png" />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Koala Statements",
      "url": "https://financial-statements-one.vercel.app/",
      "logo": "https://financial-statements-one.vercel.app/og-image.png",
      "description": "AI-native financial modeling that turns a sentence into a complete, investor-ready 3-statement model."
    }
    </script>

    <!-- Structured data: SoftwareApplication (free finance tool) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Koala Statements",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "url": "https://financial-statements-one.vercel.app/",
      "description": "Build an investor-ready 3-statement financial model from a single sentence. AI-driven assumptions, multi-scenario forecasts, industry benchmarks, and live investor reports.",
      "featureList": [
        "AI model generation from a plain-language description",
        "Automated 3-statement integration (income statement, balance sheet, cash flow)",
        "Multi-scenario analysis",
        "Industry benchmarks",
        "Shareable live investor reports"
      ],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Structured data: FAQ (eligible for rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Koala Statements?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Koala Statements is a free AI-powered financial modeling tool that turns a one-sentence business description into a complete, investor-ready 3-statement financial model — income statement, balance sheet, and cash flow — with scenarios and industry benchmarks."
          }
        },
        {
          "@type": "Question",
          "name": "Is Koala Statements free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Koala Statements is free for everyone. You can create, edit, and save as many financial models as you need, with no project caps and nothing to pay."
          }
        },
        {
          "@type": "Question",
          "name": "What is a 3-statement financial model?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A 3-statement model links the income statement, balance sheet, and cash flow statement so a change in any assumption flows through all three automatically. Koala Statements builds and integrates all three for you."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need finance experience to build a financial model?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Describe your business in plain language and the AI generates the assumptions and model structure for you. You can then edit the numbers, run multiple scenarios, and benchmark the results against your industry."
          }
        }
      ]
    }
    </script>

    <link rel="icon" type="image/png" href="/koala-mascot.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts off the critical render path so they don't block first paint.
         display=swap shows fallback text immediately; the stylesheet is applied
         once it finishes loading (media flip), with a noscript fallback. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400..800&family=Inter:wght@300..700&family=JetBrains+Mono:wght@400..600&display=swap" />
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400..800&family=Inter:wght@300..700&family=JetBrains+Mono:wght@400..600&display=swap" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400..800&family=Inter:wght@300..700&family=JetBrains+Mono:wght@400..600&display=swap" />
    </noscript>
  </head>
  <body style="margin:0; background:#F4F1E9; overflow-x:hidden; max-width:100vw;">
    <div id="root"></div>
  </body>
</html>
